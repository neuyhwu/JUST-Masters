site_name: 运筹优化知识库
site_description: 面向研究生的运筹学、优化算法、编程与机器学习综合学习平台
site_author: JUST-Masters
site_url: https://neuyhwu.github.io/JUST-Masters/

theme:
  name: material
  language: zh
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - navigation.expand
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
    - content.code.select
  
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 浅色模式
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 深色模式

nav:
  - 首页: index.md
  - 📘 运筹学:
      - 概述: operations-research/index.md
      - 线性规划: operations-research/linear-programming.md
      - 整数规划: operations-research/integer-programming.md
      - 网络流问题: operations-research/network-flows.md
  - ⚙️ 优化算法:
      - 概述: optimization-algorithms/index.md
      - 启发式算法: optimization-algorithms/heuristic-algorithms.md
      - 元启发式算法: optimization-algorithms/metaheuristic-algorithms.md
      - 高级优化方法: optimization-algorithms/advanced-optimization.md
  - 🐍 Python编程:
      - 概述: python-programming/index.md
      - 基础语法: python-programming/basic-syntax.md
      - 科学计算库: python-programming/scientific-computing.md
      - 数据处理与分析: python-programming/data-processing.md
  - ☕ Java编程:
      - 概述: java-programming/index.md
      - 基础与面向对象: java-programming/fundamentals-oop.md
      - 集合与流处理: java-programming/collections-streams.md
      - 并发编程: java-programming/concurrent-programming.md
  - 🔧 Gurobi优化求解器:
      - 概述: gurobi-solver/index.md
      - 安装与配置: gurobi-solver/installation-setup.md
      - Python接口: gurobi-solver/python-interface.md
      - 高级应用: gurobi-solver/advanced-applications.md
  - 🤖 机器学习:
      - 概述: machine-learning/index.md
      - 监督学习: machine-learning/supervised-learning.md
      - 无监督学习: machine-learning/unsupervised-learning.md
      - 深度学习基础: machine-learning/deep-learning-basics.md
  - 📚 学习资源: resources.md
  - 关于: about.md

markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2-4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

plugins:
  - search:
      lang: zh

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/neuyhwu/JUST-Masters
      name: GitHub

copyright: Copyright &copy; 2026 JUST-Masters 运筹优化知识库
