site_name: 知识库 | JUST-Masters
site_description: 一个组织化的知识整理网站
site_author: Your Name
site_url: https://neuyhwu.github.io/JUST-Masters/

# 使用Material主题
theme:
  name: material
  language: zh
  
  # Material主题特性
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.tabs.link
    - content.code.copy
  
  # 色彩主题
  palette:
    - scheme: default
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: 浅色模式
    - scheme: slate
      primary: blue
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: 深色模式

# 导航菜单
nav:
  - 首页: index.md
  - 开始: getting-started.md
  - 哲学:
      - 概述: philosophy/index.md
      - 西方哲学: philosophy/western.md
      - 马克思主义: philosophy/marxism.md
  - 文学:
      - 概述: literature/index.md
      - 诗歌: literature/poetry.md
      - 小说: literature/novels.md
  - 历史:
      - 概述: history/index.md
      - 中国历史: history/china.md
      - 世界历史: history/world.md
  - 艺术:
      - 概述: arts/index.md
      - 视觉艺术: arts/visual.md
      - 音乐: arts/music.md
  - 关于: about.md

# Markdown扩展配置
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2-4
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.caret
  - pymdownx.details
  - pymdownx.emoji
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde

# 插件配置
plugins:
  - search:
      lang: zh

# 额外设置
extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com
      name: GitHub

copyright: Copyright &copy; 2024 - 2026
